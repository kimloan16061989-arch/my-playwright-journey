<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Template</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --border: #d1d5db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
    }

    .title {
      margin: 0 0 6px;
      font-size: 24px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
    }

    input:focus {
      outline: 2px solid rgba(37, 99, 235, 0.2);
      border-color: var(--primary);
    }

    .actions {
      margin-top: 18px;
    }

    #login-button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      background: var(--primary);
      cursor: pointer;
    }

    #login-button:hover {
      background: var(--primary-hover);
    }

    .error {
      margin-top: 12px;
      font-size: 13px;
      color: var(--danger);
      min-height: 18px;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1 class="title">Đăng nhập</h1>
    <p class="subtitle">Nhập tài khoản để vào hệ thống</p>

    <form id="login-form">
      <div class="form-group">
        <label for="user-name">Username</label>
        <input id="user-name" name="username" type="text" placeholder="Nhập username" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Nhập password" />
      </div>

      <div class="actions">
        <button id="login-button" type="submit">Login</button>
      </div>
    </form>

    <p class="error" id="error-message"></p>
  </main>

  <script>
    // Demo validation đơn giản để bạn test luồng pass/fail bằng Playwright.
    const form = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const username = document.getElementById('user-name').value.trim();
      const password = document.getElementById('password').value.trim();

      if (username === 'standard_user' && password === 'secret_sauce') {
        errorMessage.textContent = '';
        window.location.href = 'dashboard.html';
        return;
      }

      errorMessage.textContent = 'Sai username hoặc password.';
    });
  </script>
</body>
</html>
